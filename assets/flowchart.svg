<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <style>
    .box{fill:#ffffff;stroke:#2b6cb0;stroke-width:2;font:14px sans-serif}
    .title{font:18px sans-serif;fill:#2b6cb0;font-weight:700}
    .arrow{stroke:#2b6cb0;stroke-width:2;fill:none;marker-end:url(#arrowhead)}
    .note{font:12px sans-serif;fill:#333}
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0"/>
    </marker>
  </defs>

  <rect x="50" y="40" width="200" height="60" rx="8" ry="8" class="box"/>
  <text x="150" y="75" text-anchor="middle" class="title">Receive Alert</text>

  <rect x="300" y="40" width="220" height="60" rx="8" ry="8" class="box"/>
  <text x="410" y="62" text-anchor="middle" class="title">Evaluate Alert</text>
  <text x="410" y="78" text-anchor="middle" class="note">severity, sender, recipient</text>

  <rect x="650" y="40" width="260" height="60" rx="8" ry="8" class="box"/>
  <text x="780" y="62" text-anchor="middle" class="title">Analyze Content</text>
  <text x="780" y="78" text-anchor="middle" class="note">links, attachments, hashes</text>

  <line x1="250" y1="70" x2="300" y2="70" class="arrow"/>
  <line x1="520" y1="70" x2="650" y2="70" class="arrow"/>

  <rect x="300" y="160" width="220" height="60" rx="8" ry="8" class="box"/>
  <text x="410" y="195" text-anchor="middle" class="title">Assess Maliciousness</text>
  <text x="410" y="211" text-anchor="middle" class="note">VirusTotal, TI, sandbox</text>

  <line x1="780" y1="100" x2="780" y2="160" class="arrow"/>

  <rect x="50" y="280" width="220" height="60" rx="8" ry="8" class="box"/>
  <text x="160" y="315" text-anchor="middle" class="title">Close Ticket</text>
  <text x="160" y="331" text-anchor="middle" class="note">not malicious / false positive</text>

  <rect x="400" y="280" width="300" height="60" rx="8" ry="8" class="box"/>
  <text x="550" y="315" text-anchor="middle" class="title">Escalate & Respond</text>
  <text x="550" y="331" text-anchor="middle" class="note">containment, eradication, hunting</text>

  <line x1="410" y1="220" x2="160" y2="280" class="arrow"/>
  <line x1="520" y1="220" x2="520" y2="280" class="arrow"/>

  <text x="60" y="370" class="note">Version 1.0 - Playbook flow for level-1 SOC analysts</text>
</svg>