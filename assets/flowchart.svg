<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <style>
    rect { fill: white; stroke: #333; stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
    .label { font-weight: bold; fill: #333; }
    line { stroke: #333; stroke-width: 2; }
    polygon { fill: #333; }
  </style>

  <!-- Start -->
  <rect x="300" y="20" width="200" height="50" rx="5"/>
  <text x="400" y="50" class="label">Receive Phishing Alert</text>

  <!-- Arrow down -->
  <line x1="400" y1="70" x2="400" y2="100"/>
  <polygon points="400,100 395,90 405,90"/>

  <!-- Evaluate -->
  <rect x="300" y="100" width="200" height="50" rx="5"/>
  <text x="400" y="125" class="label">Evaluate Alert</text>
  <text x="400" y="142" font-size="12">Check severity & sender</text>

  <!-- Arrow down -->
  <line x1="400" y1="150" x2="400" y2="180"/>
  <polygon points="400,180 395,170 405,170"/>

  <!-- Analyze -->
  <rect x="300" y="180" width="200" height="50" rx="5"/>
  <text x="400" y="205" class="label">Analyze Content</text>
  <text x="400" y="222" font-size="12">Check links & attachments</text>

  <!-- Arrow down -->
  <line x1="400" y1="230" x2="400" y2="260"/>
  <polygon points="400,260 395,250 405,250"/>

  <!-- Decision Diamond (using rect) -->
  <rect x="325" y="260" width="150" height="60" rx="5" style="fill: #ffffcc; stroke: #ff9800; stroke-width: 2"/>
  <text x="400" y="295" class="label">Malicious?</text>

  <!-- Left arrow - No -->
  <line x1="325" y1="290" x2="150" y2="290"/>
  <line x1="150" y1="290" x2="150" y2="340"/>
  <text x="200" y="280" font-size="12" fill="#333">No</text>

  <!-- Right arrow - Yes -->
  <line x1="475" y1="290" x2="650" y2="290"/>
  <line x1="650" y1="290" x2="650" y2="340"/>
  <text x="600" y="280" font-size="12" fill="#333">Yes</text>

  <!-- Close Ticket -->
  <rect x="50" y="340" width="200" height="50" rx="5" style="fill: #c8e6c9; stroke: #4caf50; stroke-width: 2"/>
  <text x="150" y="365" class="label">Close Ticket</text>
  <text x="150" y="382" font-size="12">False Positive</text>

  <!-- Escalate & Respond -->
  <rect x="550" y="340" width="200" height="50" rx="5" style="fill: #ffcccc; stroke: #f44336; stroke-width: 2"/>
  <text x="650" y="365" class="label">Escalate & Respond</text>
  <text x="650" y="382" font-size="12">Containment & Eradication</text>

  <!-- Version info -->
  <text x="400" y="580" font-size="11" fill="#999">Phishing Email Response Playbook v1.0</text>
</svg>